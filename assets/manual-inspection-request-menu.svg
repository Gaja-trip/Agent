<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">성과 메뉴에서 검사요청 선택</title>
  <desc id="desc">지적측량업무시스템 상단 성과 메뉴와 하위 검사요청 항목을 빨간색으로 강조하고 확대 표시한 예시 화면</desc>
  <rect width="1180" height="560" fill="#102943"/>
  <rect width="1180" height="64" fill="#fff"/>
  <text x="38" y="40" fill="#0f2c45" font-family="Arial, sans-serif" font-size="24" font-weight="800">LX BizLand 지적측량업무시스템</text>
  <rect y="64" width="1180" height="52" fill="#06446e"/>
  <g font-family="Arial, sans-serif" font-size="18" font-weight="800" text-anchor="middle">
    <text x="180" y="97" fill="#fff">접수</text>
    <text x="310" y="97" fill="#fff">일정</text>
    <text x="440" y="97" fill="#fff">정산</text>
    <text x="570" y="97" fill="#fff">성과</text>
    <text x="700" y="97" fill="#fff">결산</text>
    <text x="840" y="97" fill="#fff">계산서</text>
  </g>
  <rect x="528" y="66" width="88" height="46" fill="none" stroke="#ff2a2a" stroke-width="5"/>
  <rect x="520" y="116" width="120" height="150" fill="#fff" filter="url(#shadow)"/>
  <g font-family="Arial, sans-serif" font-size="16" font-weight="800" text-anchor="middle">
    <text x="580" y="148" fill="#111">검사요청</text>
    <text x="580" y="194" fill="#111">성과도수령</text>
    <text x="580" y="238" fill="#111">성과도교부</text>
  </g>
  <rect x="528" y="126" width="104" height="34" fill="none" stroke="#ff2a2a" stroke-width="4"/>
  <text x="760" y="218" fill="#35d5e5" font-family="Arial, sans-serif" font-size="30" font-weight="800">성과 &gt; 검사요청</text>
  <text x="760" y="260" fill="#fff" font-family="Arial, sans-serif" font-size="18">성과검사요청서는 상단 성과 메뉴에서 검사요청을 선택해 시작합니다.</text>

  <g transform="translate(720 305)">
    <rect width="390" height="178" rx="8" fill="#fff" stroke="#ff2a2a" stroke-width="5"/>
    <text x="24" y="38" fill="#ff2a2a" font-family="Arial, sans-serif" font-size="17" font-weight="900">확대 보기</text>
    <rect x="28" y="62" width="334" height="50" fill="#06446e"/>
    <text x="195" y="94" fill="#fff" font-family="Arial, sans-serif" font-size="24" font-weight="900" text-anchor="middle">성과</text>
    <rect x="120" y="112" width="150" height="44" fill="#fff" stroke="#d8dfe5"/>
    <text x="195" y="141" fill="#111" font-family="Arial, sans-serif" font-size="22" font-weight="900" text-anchor="middle">검사요청</text>
  </g>

  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.24"/>
    </filter>
  </defs>
</svg>
