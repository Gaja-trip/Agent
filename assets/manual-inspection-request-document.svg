    <text x="134" y="195">부안군수(민원과장)</text>
    <text x="28" y="247">(경유)</text>
    <text x="36" y="307">제목</text>
    <text x="134" y="307">지적측량 성과검사요청서</text>
  </g>
  <rect x="116" y="166" width="420" height="42" fill="none" stroke="#ff2a2a" stroke-width="4"/>
  <rect x="116" y="276" width="520" height="48" fill="none" stroke="#ff2a2a" stroke-width="4"/>

  <text x="24" y="386" fill="#111" font-family="Arial, sans-serif" font-size="28">「공간정보의 구축 및 관리 등에 관한 법률」 제25조 제1항 및 「지적측량시행규칙」</text>
  <text x="24" y="428" fill="#111" font-family="Arial, sans-serif" font-size="28">제28조 제2항에 의하여 아래와 같이 지적측량 검사를 요청합니다.</text>
  <rect x="12" y="350" width="1110" height="98" fill="none" stroke="#ff2a2a" stroke-width="3"/>
  <text x="590" y="502" fill="#111" font-family="Arial, sans-serif" font-size="28" text-anchor="middle">- 아 래 -</text>

