  <text x="1040" y="78" fill="#1284c3" font-family="Arial, sans-serif" font-size="34" font-weight="900" text-anchor="middle">Land1</text>
  <text x="1040" y="116" fill="#0f4a79" font-family="Arial, sans-serif" font-size="20" font-weight="800" text-anchor="middle">함께하는 안전</text>

