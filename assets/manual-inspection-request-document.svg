<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">지적측량 성과검사요청서</title>
  <desc id="desc">성과검사요청서 문서에서 수신, 제목, 근거 조항, 대상 토지를 빨간색으로 강조하고 확대 표시한 예시 화면</desc>
  <rect width="1180" height="760" fill="#fff"/>
  <rect x="8" y="8" width="1164" height="150" fill="#fff" stroke="#ff6565" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="78" y="84" fill="#0bb39d" font-family="Arial, sans-serif" font-size="54" font-weight="900">LX</text>
  <text x="50" y="120" fill="#0f2c45" font-family="Arial, sans-serif" font-size="18" font-weight="800">한국국토정보공사</text>
