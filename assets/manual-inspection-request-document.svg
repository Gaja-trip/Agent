  <line x1="8" y1="260" x2="1172" y2="260" stroke="#ff6565" stroke-dasharray="3 3"/>
  <line x1="120" y1="158" x2="120" y2="338" stroke="#ff6565" stroke-dasharray="3 3"/>
  <g font-family="Arial, sans-serif" font-size="28" fill="#111">
