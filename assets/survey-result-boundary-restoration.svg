      .stamp { fill: none; stroke: #d4002a; stroke-width: 1.8; opacity: .45; filter: url(#stampBlur); }
      .stampText { font: 18px "Malgun Gothic", sans-serif; fill: #d4002a; opacity: .45; filter: url(#stampBlur); }
      .point { fill: #fff; stroke: #f00; stroke-width: 2; }
      .boundary { fill: #fdfdfd; stroke: #111; stroke-width: 1.2; }
      .subline { fill: none; stroke: #111; stroke-width: .9; }
