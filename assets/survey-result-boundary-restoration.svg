      .line { fill: none; stroke: #111; stroke-width: 1.2; }
      .thin { fill: none; stroke: #111; stroke-width: .8; }
      .label { font: 16px "Malgun Gothic", sans-serif; fill: #111; }
      .small { font: 13px "Malgun Gothic", sans-serif; fill: #111; }
      .tiny { font: 11px "Malgun Gothic", sans-serif; fill: #111; }
      .title { font: 34px "Malgun Gothic", sans-serif; letter-spacing: 4px; fill: #111; }
