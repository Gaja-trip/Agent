<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="420" viewBox="0 0 1180 420" role="img" aria-labelledby="title desc">
  <title id="title">일정 메뉴에서 측량수행계획서를 선택하는 화면</title>
  <desc id="desc">지적측량업무시스템의 상단 일정 메뉴와 하위 측량수행계획서 항목을 강조한 예시 화면</desc>
  <rect width="1180" height="420" fill="#102943"/>
  <rect x="0" y="0" width="1180" height="70" fill="#ffffff"/>
  <text x="34" y="43" fill="#0f2c45" font-family="Arial, sans-serif" font-size="25" font-weight="800">LX BizLand 지적측량업무시스템</text>
  <rect x="0" y="70" width="1180" height="50" fill="#05436d"/>
  <g font-family="Arial, sans-serif" font-size="18" font-weight="800" text-anchor="middle">
    <text x="180" y="101" fill="#ffffff">접수</text>
    <text x="282" y="101" fill="#ffffff">일정</text>
    <text x="384" y="101" fill="#ffffff">정산</text>
    <text x="486" y="101" fill="#ffffff">성과</text>
    <text x="588" y="101" fill="#ffffff">결산</text>
    <text x="710" y="101" fill="#ffffff">계산서</text>
    <text x="835" y="101" fill="#ffffff">목표량</text>
    <text x="970" y="101" fill="#ffffff">기준정보관리</text>
    <text x="1110" y="101" fill="#ffffff">상담</text>
  </g>
  <rect x="244" y="72" width="86" height="46" fill="none" stroke="#ff2a2a" stroke-width="5"/>
  <rect x="229" y="120" width="138" height="270" fill="#ffffff" filter="url(#shadow)"/>
  <g font-family="Arial, sans-serif" font-size="15" font-weight="800" fill="#111">
    <text x="248" y="153">측량일정관리</text>
    <text x="248" y="197">예약불가측량관리</text>
    <text x="248" y="241">집행지시관리</text>
    <text x="248" y="285">출장관리</text>
    <text x="248" y="329" fill="#14a6b8">측량수행계획서</text>
    <text x="248" y="371">신청서관리</text>
  </g>
  <rect x="239" y="305" width="118" height="36" fill="none" stroke="#ff2a2a" stroke-width="5"/>
  <text x="590" y="228" fill="#35d5e5" font-family="Arial, sans-serif" font-size="25" text-anchor="middle">일정 메뉴에서 측량수행계획서를 선택합니다.</text>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
</svg>
