<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="토지이음, 다음지도, 국가법령정보센터를 탭으로 연결하는 토지정보 통합 안내 페이지"
    />
    <title>토지정보 통합 안내</title>
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="script.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="토지정보 통합 안내 첫 화면">
        <span class="brand__mark" aria-hidden="true">
          <i data-lucide="map"></i>
        </span>
        <span>
          <strong>토지정보 통합 안내</strong>
          <small>공개 안내 페이지</small>
        </span>
      </a>
      <nav class="main-nav" aria-label="주요 메뉴">
        <a href="info.html">정보 연결</a>
        <a href="process.html">진행 절차</a>
        <a href="checklist.html">준비자료</a>
      </nav>
    </header>

    <main id="top">
      <section class="home-landing" aria-labelledby="main-title">
        <img
          class="home-landing__image"
          src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1800&q=80"
          alt="농지와 도로가 내려다보이는 토지 풍경"
        />
        <div class="home-landing__overlay" aria-hidden="true"></div>

        <div class="home-landing__content">
          <h1 id="main-title">토지정보 통합 안내</h1>

          <div class="portal-workspace">
            <div class="portal-tabs" role="tablist" aria-label="토지정보 연결 서비스">
              <button class="portal-tab is-active" type="button" role="tab" aria-selected="true" data-portal="eum">
                <i data-lucide="layers"></i>
                토지이음
              </button>
              <button class="portal-tab" type="button" role="tab" aria-selected="false" data-portal="map">
                <i data-lucide="satellite"></i>
                다음지도
              </button>
              <button class="portal-tab" type="button" role="tab" aria-selected="false" data-portal="law">
                <i data-lucide="scale"></i>
                법령정보
              </button>
            </div>

            <article class="portal-panel" role="tabpanel" aria-live="polite" data-portal-panel>
              <div class="portal-panel__main">
                <div class="portal-panel__top">
                  <span class="portal-panel__icon" aria-hidden="true">
                    <i data-lucide="layers"></i>
                  </span>
                  <div>
                    <p class="eyebrow">토지이용계획 확인</p>
                    <h2>토지이음</h2>
                  </div>
                </div>
                <p class="portal-panel__copy">
                  대상 필지의 토지이용계획, 용도지역·지구, 행위제한, 도시계획시설 여부를 확인합니다.
                </p>
                <a class="button button--primary portal-panel__button" href="https://www.eum.go.kr/web/am/amMain.jsp" target="_blank" rel="noopener">
                  <i data-lucide="external-link"></i>
                  토지이음 열기
                </a>
              </div>

              <div class="portal-panel__details">
                <div>
                  <h3>확인할 내용</h3>
                  <ul>
                    <li>지번 기반 토지이용계획 열람</li>
                    <li>용도지역, 용도지구, 구역 지정 여부</li>
                    <li>허가 가능성에 영향을 주는 행위제한</li>
                  </ul>
                </div>
                <div>
                  <h3>상담 연결 포인트</h3>
                  <ul>
                    <li>허가부서 상담 전 기초 규제 확인</li>
                    <li>다음지도 현황 검토와 비교</li>
                    <li>법령정보에서 근거 조항 확인</li>
                  </ul>
                </div>
              </div>
            </article>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
