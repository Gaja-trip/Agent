<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="토지이음, 토지이음 지도, 국가법령정보센터를 메인 페이지 안에서 연결하는 토지정보 통합 안내 페이지"
    />
    <title>토지정보 통합 안내</title>
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="script.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="토지정보 통합 안내 첫 화면">
        <span class="brand__mark" aria-hidden="true">
          <i data-lucide="map"></i>
        </span>
        <span>
          <strong>토지정보 통합 안내</strong>
          <small>공개 안내 페이지</small>
        </span>
      </a>
      <nav class="main-nav" aria-label="주요 메뉴">
        <a href="info.html">정보 연결</a>
        <a href="process.html">진행 절차</a>
        <a href="checklist.html">준비자료</a>
      </nav>
    </header>

    <main id="top">
      <section class="home-landing" aria-labelledby="main-title">
        <img
          class="home-landing__image"
          src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1800&q=80"
          alt="농지와 도로가 내려다보이는 토지 풍경"
        />
        <div class="home-landing__overlay" aria-hidden="true"></div>

        <div class="home-landing__content">
          <h1 id="main-title">토지정보 통합 안내</h1>

          <div class="portal-workspace">
            <div class="portal-tabs" role="tablist" aria-label="토지정보 연결 서비스">
              <button class="portal-tab is-active" type="button" role="tab" aria-selected="true" data-portal="eum">
                <i data-lucide="layers"></i>
                토지이음
              </button>
              <button class="portal-tab" type="button" role="tab" aria-selected="false" data-portal="map">
                <i data-lucide="map-pinned"></i>
                토지이음 지도
              </button>
              <button class="portal-tab" type="button" role="tab" aria-selected="false" data-portal="law">
                <i data-lucide="scale"></i>
                법령정보
              </button>
            </div>

            <article class="portal-panel" role="tabpanel" aria-live="polite" data-portal-panel>
              <div class="embedded-site">
                <iframe
                  class="embedded-site__frame"
                  title="토지이음 웹페이지"
                  src="https://www.eum.go.kr/web/am/amMain.jsp"
                  loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"
                ></iframe>
              </div>
            </article>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
